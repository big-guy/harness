    <!-- middle: amber -->
    <polygon points="74,32 114,32 176,224 136,224" fill="#fbbf24"/>
    <!-- front: green -->
    <polygon points="118,32 158,32 220,224 180,224" fill="#22c55e"/>
  </g>
</svg>
