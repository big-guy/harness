<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <clipPath id="sq"><rect width="256" height="256" rx="56" ry="56"/></clipPath>
  </defs>
  <rect width="256" height="256" rx="56" ry="56" fill="#0a0a0a"/>
  <g clip-path="url(#sq)">
    <!-- three parallel wedges leaning along the N-diagonal -->
    <!-- back: gray -->
