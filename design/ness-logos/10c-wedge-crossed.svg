<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <clipPath id="sq"><rect width="256" height="256" rx="56" ry="56"/></clipPath>
  </defs>
  <rect width="256" height="256" rx="56" ry="56" fill="#0a0a0a"/>
  <g clip-path="url(#sq)">
    <!-- gray wedge in the back, gentle slope -->
    <polygon points="40,30 86,30 156,226 110,226" fill="#a3a3a3" opacity="0.4"/>
    <!-- bold green wedge -->
    <polygon points="86,28 142,28 216,228 160,228" fill="#22c55e"/>
    <!-- thin amber wedge crossing the other way -->
    <polygon points="208,28 232,28 56,228 32,228" fill="#fbbf24" opacity="0.9"/>
  </g>
</svg>
