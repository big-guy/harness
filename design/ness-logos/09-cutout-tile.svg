<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <mask id="ncut">
      <rect width="256" height="256" fill="white"/>
      <text x="128" y="200" text-anchor="middle"
            font-family="-apple-system, system-ui, 'SF Pro Display', 'Helvetica Neue', sans-serif"
            font-weight="900" font-size="220" fill="black"
            letter-spacing="-12">N</text>
    </mask>
  </defs>

  <!-- green base -->
  <rect width="256" height="256" rx="56" fill="#22c55e"/>
  <!-- dark tile with N punched through to reveal green -->
  <rect width="256" height="256" rx="56" fill="#0a0a0a" mask="url(#ncut)"/>
</svg>
