<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <clipPath id="sq"><rect width="256" height="256" rx="56" ry="56"/></clipPath>

    <linearGradient id="trail" gradientUnits="userSpaceOnUse"
                    x1="38" y1="46" x2="200" y2="78">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="55%"  stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="grayAccent" gradientUnits="userSpaceOnUse"
                    x1="60" y1="56" x2="200" y2="86">
      <stop offset="0%"   stop-color="#737373" stop-opacity="0"/>
      <stop offset="65%"  stop-color="#737373" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#737373" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="256" height="256" rx="56" ry="56" fill="#0a0a0a"/>

  <g clip-path="url(#sq)">
    <!-- single gray accent along the lower edge of the streak -->
    <polygon points="60,58 200,84 200,90" fill="url(#grayAccent)"/>

    <!-- yellow shooting star tapered trail -->
    <polygon points="38,46 200,72 200,84" fill="url(#trail)"/>

    <!-- shooting star head, no glow -->
    <circle cx="200" cy="78" r="9.5" fill="#fbbf24"/>

    <!-- original 04 horizon line -->
    <line x1="0" y1="148" x2="256" y2="148"
          stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>

    <!-- original 04 mountain silhouette -->
    <path d="M 16 148
             L 48 112
             L 82 134
             L 118 86
             L 154 122
             L 190 100
             L 222 130
             L 240 148 Z"
          fill="#22c55e"/>

    <!-- original 04 reflection -->
    <path d="M 16 150
             L 48 174
             L 82 158
             L 118 192
             L 154 166
             L 190 184
             L 222 162
             L 240 150 Z"
          fill="#22c55e" opacity="0.12"/>
  </g>
</svg>
