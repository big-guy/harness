<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <clipPath id="sq11"><rect width="256" height="256" rx="56" ry="56"/></clipPath>

    <!-- the creature: humps trailing left, neck + head rising right.
         no fill here so each <use> can color it (green original, gray reflection) -->
    <g id="nessie">
      <!-- far hump (smaller, trailing) -->
      <path d="M 56 159 A 22 17 0 0 1 100 159 Z"/>
      <!-- near hump (larger, merges into neck base) -->
      <path d="M 96 159 A 28 23 0 0 1 152 159 Z"/>
      <!-- skinny neck + head, snout pointing right -->
      <path d="M 154 159
               C 149 126 148 98 160 82
               C 168 71 183 69 195 75
               C 204 79 210 85 212 91
               C 213 94 210 96 206 96
               C 200 96 193 95 187 97
               C 181 99 179 104 178 112
               C 177 128 178 146 178 159 Z"/>
    </g>

    <!-- rippled + diffuse water: watery displacement then a soft blur -->
    <filter id="ripple" x="-25%" y="-25%" width="150%" height="160%">
      <feTurbulence type="turbulence" baseFrequency="0.015 0.05"
                    numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="7"
                         xChannelSelector="R" yChannelSelector="G" result="disp"/>
      <feGaussianBlur in="disp" stdDeviation="1.4"/>
    </filter>

    <!-- depth fade: reflection dissolves the deeper it goes -->
    <linearGradient id="fade11" x1="0" y1="159" x2="0" y2="214"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="1"   stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="fademask11"><rect width="256" height="256" fill="url(#fade11)"/></mask>
  </defs>

  <rect width="256" height="256" rx="56" ry="56" fill="#0a0a0a"/>

  <g clip-path="url(#sq11)">
    <!-- solid yellow bands down the left and right, each 10% of the width,
         each carrying a single column of gray status dots -->
    <rect x="0" y="0" width="25.6" height="256" fill="#737373"/>
    <rect x="230.4" y="0" width="25.6" height="256" fill="#737373"/>
    <g fill="#fbbf24">
      <circle cx="12.8" cy="32"  r="11.5"/>
      <circle cx="12.8" cy="64"  r="11.5"/>
      <circle cx="12.8" cy="96"  r="11.5"/>
      <circle cx="12.8" cy="128" r="11.5"/>
      <circle cx="12.8" cy="160" r="11.5"/>
      <circle cx="12.8" cy="192" r="11.5"/>
      <circle cx="12.8" cy="224" r="11.5"/>
      <circle cx="243.2" cy="32"  r="11.5"/>
      <circle cx="243.2" cy="64"  r="11.5"/>
      <circle cx="243.2" cy="96"  r="11.5"/>
      <circle cx="243.2" cy="128" r="11.5"/>
      <circle cx="243.2" cy="160" r="11.5"/>
      <circle cx="243.2" cy="192" r="11.5"/>
      <circle cx="243.2" cy="224" r="11.5"/>
    </g>

    <!-- waterline -->
    <line x1="0" y1="159" x2="256" y2="159"
          stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>

    <!-- gray reflection: mirrored + compressed, then rippled + diffused + faded -->
    <g mask="url(#fademask11)" filter="url(#ripple)">
      <use href="#nessie" fill="#a3a3a3" opacity="0.2"
           transform="matrix(1 0 0 -0.5 0 238.5)"/>
    </g>

    <!-- faint surface ripple lines -->
    <g stroke="#a3a3a3" stroke-width="1" opacity="0.08" stroke-linecap="round">
      <line x1="150" y1="171" x2="214" y2="171"/>
      <line x1="140" y1="184" x2="206" y2="184"/>
      <line x1="158" y1="196" x2="200" y2="196"/>
    </g>

    <!-- green creature silhouette (drawn last → occludes the graph behind it) -->
    <use href="#nessie" fill="#22c55e"/>
  </g>
</svg>
