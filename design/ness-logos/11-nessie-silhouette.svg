<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <clipPath id="sq11"><rect width="256" height="256" rx="56" ry="56"/></clipPath>

    <!-- the creature: humps trailing left, neck + head rising right.
         no fill here so each <use> can color it (green original, gray reflection) -->
    <g id="nessie">
      <!-- far hump (smaller, trailing) -->
      <path d="M 34 159 A 22 17 0 0 1 78 159 Z"/>
      <!-- near hump (larger, merges into neck base) -->
      <path d="M 74 159 A 26 22 0 0 1 126 159 Z"/>
      <!-- neck + head, snout pointing right -->
      <path d="M 130 159
               C 122 124 120 92 138 76
               C 148 67 162 66 174 71
               C 184 75 190 82 192 90
               C 198 90 205 91 208 95
               C 210 98 207 101 202 101
               C 196 101 189 99 183 100
               C 175 101 172 106 171 114
               C 170 132 172 148 172 159 Z"/>
    </g>
  </defs>

  <rect width="256" height="256" rx="56" ry="56" fill="#0a0a0a"/>

  <g clip-path="url(#sq11)">
    <!-- yellow moon in the upper-left -->
    <circle cx="58" cy="58" r="27" fill="#fbbf24"/>

    <!-- faint moon shimmer on the water -->
    <ellipse cx="58" cy="172" rx="20" ry="6" fill="#fbbf24" opacity="0.14"/>

    <!-- waterline -->
    <line x1="0" y1="159" x2="256" y2="159"
          stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>

    <!-- gray reflection: mirrored + compressed across the waterline -->
    <use href="#nessie" fill="#a3a3a3" opacity="0.16"
         transform="matrix(1 0 0 -0.5 0 238.5)"/>

    <!-- green creature silhouette -->
    <use href="#nessie" fill="#22c55e"/>
  </g>
</svg>
