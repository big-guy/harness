<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- creature humps cresting the water -->
  <path d="M 28 132
           Q 52 96 76 132
           Q 100 96 124 132
           Q 148 96 172 132
           Q 196 96 220 132"
        stroke="#22c55e" stroke-width="11" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- waterline -->
  <line x1="20" y1="150" x2="236" y2="150"
        stroke="#22c55e" stroke-width="2"
        stroke-dasharray="2 8" opacity="0.55"/>

  <!-- wordmark -->
  <text x="128" y="208" text-anchor="middle"
        font-family="-apple-system, system-ui, 'SF Pro Display', sans-serif"
        font-weight="700" font-size="40" fill="#f5f5f5"
        letter-spacing="-1" textLength="80" lengthAdjust="spacingAndGlyphs">ness</text>
</svg>
