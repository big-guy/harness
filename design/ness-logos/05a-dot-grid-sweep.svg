<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" rx="56" ry="56" fill="#0a0a0a"/>

  <!-- 7x7 grid: cx = 20 + col*36, cy = 20 + row*36, r = 12
       N cells colored by diagonal distance (col+row):
         0-3 gray, 4-7 amber, 8+ green.
       Background cells dim. -->

  <!-- row 0 -->
  <circle cx="20"  cy="20"  r="12" fill="#737373"/>
  <circle cx="56"  cy="20"  r="12" fill="#262626"/>
  <circle cx="92"  cy="20"  r="12" fill="#262626"/>
  <circle cx="128" cy="20"  r="12" fill="#262626"/>
  <circle cx="164" cy="20"  r="12" fill="#262626"/>
  <circle cx="200" cy="20"  r="12" fill="#262626"/>
  <circle cx="236" cy="20"  r="12" fill="#fbbf24"/>

  <!-- row 1 -->
  <circle cx="20"  cy="56"  r="12" fill="#737373"/>
  <circle cx="56"  cy="56"  r="12" fill="#737373"/>
  <circle cx="92"  cy="56"  r="12" fill="#262626"/>
  <circle cx="128" cy="56"  r="12" fill="#262626"/>
  <circle cx="164" cy="56"  r="12" fill="#262626"/>
  <circle cx="200" cy="56"  r="12" fill="#262626"/>
  <circle cx="236" cy="56"  r="12" fill="#fbbf24"/>

  <!-- row 2 -->
  <circle cx="20"  cy="92"  r="12" fill="#737373"/>
  <circle cx="56"  cy="92"  r="12" fill="#262626"/>
  <circle cx="92"  cy="92"  r="12" fill="#fbbf24"/>
  <circle cx="128" cy="92"  r="12" fill="#262626"/>
  <circle cx="164" cy="92"  r="12" fill="#262626"/>
  <circle cx="200" cy="92"  r="12" fill="#262626"/>
  <circle cx="236" cy="92"  r="12" fill="#22c55e"/>

  <!-- row 3 -->
  <circle cx="20"  cy="128" r="12" fill="#737373"/>
  <circle cx="56"  cy="128" r="12" fill="#262626"/>
  <circle cx="92"  cy="128" r="12" fill="#262626"/>
  <circle cx="128" cy="128" r="12" fill="#fbbf24"/>
  <circle cx="164" cy="128" r="12" fill="#262626"/>
  <circle cx="200" cy="128" r="12" fill="#262626"/>
  <circle cx="236" cy="128" r="12" fill="#22c55e"/>

  <!-- row 4 -->
  <circle cx="20"  cy="164" r="12" fill="#fbbf24"/>
  <circle cx="56"  cy="164" r="12" fill="#262626"/>
  <circle cx="92"  cy="164" r="12" fill="#262626"/>
  <circle cx="128" cy="164" r="12" fill="#262626"/>
  <circle cx="164" cy="164" r="12" fill="#22c55e"/>
  <circle cx="200" cy="164" r="12" fill="#262626"/>
  <circle cx="236" cy="164" r="12" fill="#22c55e"/>

  <!-- row 5 -->
  <circle cx="20"  cy="200" r="12" fill="#fbbf24"/>
  <circle cx="56"  cy="200" r="12" fill="#262626"/>
  <circle cx="92"  cy="200" r="12" fill="#262626"/>
  <circle cx="128" cy="200" r="12" fill="#262626"/>
  <circle cx="164" cy="200" r="12" fill="#262626"/>
  <circle cx="200" cy="200" r="12" fill="#22c55e"/>
  <circle cx="236" cy="200" r="12" fill="#22c55e"/>

  <!-- row 6 -->
  <circle cx="20"  cy="236" r="12" fill="#fbbf24"/>
  <circle cx="56"  cy="236" r="12" fill="#262626"/>
  <circle cx="92"  cy="236" r="12" fill="#262626"/>
  <circle cx="128" cy="236" r="12" fill="#262626"/>
  <circle cx="164" cy="236" r="12" fill="#262626"/>
  <circle cx="200" cy="236" r="12" fill="#262626"/>
  <circle cx="236" cy="236" r="12" fill="#22c55e"/>
</svg>
