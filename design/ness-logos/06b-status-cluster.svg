<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" rx="56" ry="56" fill="#0a0a0a"/>

  <!-- connecting threads from center to each satellite -->
  <g stroke="#262626" stroke-width="2" fill="none">
    <line x1="128" y1="128" x2="68"  y2="74"/>
    <line x1="128" y1="128" x2="196" y2="78"/>
    <line x1="128" y1="128" x2="60"  y2="180"/>
    <line x1="128" y1="128" x2="200" y2="184"/>
    <line x1="128" y1="128" x2="128" y2="50"/>
    <line x1="128" y1="128" x2="128" y2="208"/>
  </g>

  <!-- satellites: a mix of states -->
  <circle cx="68"  cy="74"  r="13" fill="#fbbf24"/>
  <circle cx="196" cy="78"  r="13" fill="#737373"/>
  <circle cx="60"  cy="180" r="13" fill="#22c55e"/>
  <circle cx="200" cy="184" r="13" fill="#fbbf24"/>
  <circle cx="128" cy="50"  r="10" fill="#737373"/>
  <circle cx="128" cy="208" r="10" fill="#22c55e"/>

  <!-- central orchestrator -->
  <circle cx="128" cy="128" r="22" fill="#22c55e"/>
</svg>
