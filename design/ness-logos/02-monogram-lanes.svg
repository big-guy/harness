<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="lane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- left vertical lane -->
  <rect x="44" y="44" width="26" height="168" rx="6" fill="url(#lane)"/>
  <rect x="54" y="56" width="6" height="144" rx="2" fill="#0a0a0a" opacity="0.35"/>

  <!-- diagonal lane (from top-left of left bar to bottom-right of right bar) -->
  <g transform="translate(128 128) rotate(33)">
    <rect x="-13" y="-118" width="26" height="236" rx="6" fill="url(#lane)"/>
    <rect x="-3" y="-104" width="6" height="208" rx="2" fill="#0a0a0a" opacity="0.35"/>
  </g>

  <!-- right vertical lane -->
  <rect x="186" y="44" width="26" height="168" rx="6" fill="url(#lane)"/>
  <rect x="196" y="56" width="6" height="144" rx="2" fill="#0a0a0a" opacity="0.35"/>
</svg>
